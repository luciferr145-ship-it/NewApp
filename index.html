<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roshan Narendra — 3D Designer & Brand Architect</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *,::before,::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --or:#FF5500;--org:#FF7733;--bg:#04060A;--bg2:#070A10;
            --wh:#EFF2F8;--mu:#5A6478;--card:rgba(255,255,255,0.025);
            --bdr:rgba(255,85,0,0.12);--sat:#1A2038;
            --glow:rgba(255,85,0,0.18);
        }
        html{scroll-behavior:smooth}
        body{background:var(--bg);color:var(--wh);font-family:'Syne',sans-serif;overflow-x:hidden;cursor:none}
        
        /* LOADER */
        #loader{position:fixed;inset:0;background:#000;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity 0.8s,visibility 0.8s}
        #loader.hide{opacity:0;visibility:hidden}
        .loader-bar{width:280px;height:1px;background:rgba(255,85,0,0.15);overflow:hidden}
        .loader-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--org));width:0%;transition:width 0.05s linear}
        .loader-text{font-family:'Space Mono',monospace;font-size:10px;color:var(--or);letter-spacing:5px;text-transform:uppercase}
        .loader-num{font-size:72px;font-weight:800;color:var(--wh);letter-spacing:-4px;line-height:1;font-variant-numeric:tabular-nums}
        .loader-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:4px}
        
        /* CURSOR */
        #cur{width:6px;height:6px;background:var(--or);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transition:width 0.2s,height 0.2s,background 0.2s,transform 0.2s;mix-blend-mode:screen}
        #cur-r{width:32px;height:32px;border:1px solid rgba(255,85,0,0.45);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transition:width 0.35s cubic-bezier(0.16,1,0.3,1),height 0.35s cubic-bezier(0.16,1,0.3,1),opacity 0.3s,border-color 0.3s}
        body.hovering #cur{width:14px;height:14px}
        body.hovering #cur-r{width:56px;height:56px;opacity:0.25;border-color:rgba(255,85,0,0.7)}
        
        /* BG CANVAS */
        #bgc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        
        /* NAV */
        nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:26px 64px;backdrop-filter:blur(28px);background:rgba(4,6,10,0.75);border-bottom:1px solid rgba(255,85,0,0.06);transition:padding 0.3s}
        nav.scrolled{padding:16px 64px}
        .nav-logo{font-size:22px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:8px}
        .nav-logo em{color:var(--or);font-style:normal}
        .nav-logo svg{opacity:0.7}
        .nav-links{display:flex;gap:36px;list-style:none}
        .nav-links a{color:var(--mu);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;transition:color 0.3s;position:relative}
        .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--or);transform:scaleX(0);transform-origin:left;transition:transform 0.3s}
        .nav-links a:hover{color:var(--or)}
        .nav-links a:hover::after{transform:scaleX(1)}
        .nav-cta{background:var(--or);color:#000;padding:11px 26px;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.5px;border:none;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:all 0.3s;text-transform:uppercase}
        .nav-cta:hover{background:var(--org);transform:translateY(-1px);box-shadow:0 8px 32px rgba(255,85,0,0.4)}
        
        /* HERO */
        #hero{min-height:100vh;display:flex;align-items:center;padding:0 64px;padding-top:100px;position:relative;z-index:10;overflow:hidden}
        .hero-inner{max-width:1440px;margin:0 auto;width:100%;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
        .hero-eyebrow{font-family:'Space Mono',monospace;font-size:10px;color:var(--or);letter-spacing:5px;text-transform:uppercase;margin-bottom:28px;display:flex;align-items:center;gap:16px;opacity:0;animation:fadeUp 0.8s ease 0.5s forwards}
        .hero-eyebrow-dot{width:6px;height:6px;background:var(--or);border-radius:50%;box-shadow:0 0 12px rgba(255,85,0,0.8);animation:pulse 2s ease infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 6px rgba(255,85,0,0.8)}50%{box-shadow:0 0 20px rgba(255,85,0,1),0 0 40px rgba(255,85,0,0.4)}}
        h1.hero-h{font-size:clamp(54px,6.8vw,96px);font-weight:800;line-height:0.9;letter-spacing:-3.5px;overflow:hidden}
        .hero-line{display:block;overflow:hidden}
        .hero-line-inner{display:block;transform:translateY(110%);animation:lineUp 1s cubic-bezier(0.16,1,0.3,1) forwards}
        .hero-line-inner.d1{animation-delay:0.55s}.hero-line-inner.d2{animation-delay:0.7s}.hero-line-inner.d3{animation-delay:0.85s}
        .acc{color:var(--or)}
        .hero-sub{font-family:'Space Mono',monospace;font-size:13px;color:var(--mu);line-height:1.85;max-width:480px;margin:32px 0 44px;opacity:0;animation:fadeUp 0.8s ease 1.1s forwards}
        .hero-btns{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeUp 0.8s ease 1.25s forwards}
        
        .btn-p{background:var(--or);color:#000;padding:17px 38px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:0.5px;border:none;border-radius:2px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.3s;position:relative;overflow:hidden}
        .btn-p::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);transform:translateX(-100%);transition:transform 0.5s}
        .btn-p:hover::before{transform:translateX(100%)}
        .btn-p:hover{transform:translateY(-2px);box-shadow:0 16px 48px rgba(255,85,0,0.4)}
        .btn-p .arr{transition:transform 0.3s}.btn-p:hover .arr{transform:translateX(5px)}
        
        .btn-wa{background:rgba(37,211,102,0.12);color:#25D366;padding:17px 38px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;border:1px solid rgba(37,211,102,0.25);border-radius:2px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:10px;transition:all 0.3s}
        .btn-wa:hover{background:rgba(37,211,102,0.2);border-color:rgba(37,211,102,0.5);transform:translateY(-2px);box-shadow:0 12px 36px rgba(37,211,102,0.2)}
        .btn-o{background:transparent;color:var(--wh);padding:17px 38px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.3s}
        .btn-o:hover{border-color:var(--or);color:var(--or)}
        
        .hero-stats{display:flex;gap:52px;margin-top:52px;padding-top:44px;border-top:1px solid rgba(255,255,255,0.05);opacity:0;animation:fadeUp 0.8s ease 1.45s forwards}
        .stat-n{font-size:40px;font-weight:800;color:var(--or);line-height:1;font-variant-numeric:tabular-nums}
        .stat-l{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:3px;margin-top:8px;font-family:'Space Mono',monospace}
        
        /* HERO RIGHT — Space Scene */
        .hero-right{position:relative;display:flex;align-items:center;justify-content:center;opacity:0;animation:fadeUp 0.8s ease 0.95s forwards}
        #space-canvas{border-radius:4px;position:relative;z-index:1}
        .space-label{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:2.5px;white-space:nowrap}
        
        /* SECTION */
        .sw{position:relative;z-index:10}
        .section-inner{max-width:1440px;margin:0 auto;padding:110px 64px}
        .sh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:80px;padding-bottom:36px;border-bottom:1px solid var(--bdr)}
        .sn{font-family:'Space Mono',monospace;font-size:10px;color:var(--or);letter-spacing:5px;display:block;margin-bottom:16px;text-transform:uppercase}
        .st{font-size:clamp(38px,4.8vw,62px);font-weight:800;letter-spacing:-2.5px;line-height:0.95}
        
        /* MARQUEE */
        .mq-wrap{padding:22px 0;border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);overflow:hidden;background:rgba(255,85,0,0.018)}
        .mq-track{display:flex;gap:64px;width:max-content;animation:mq 30s linear infinite}
        .mq-item{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;color:var(--mu);white-space:nowrap;display:flex;align-items:center;gap:22px}
        .mq-sep{display:inline-flex;align-items:center;justify-content:center;color:var(--or);opacity:0.7}
        @keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
        
        /* TIMELINE */
        #experience{background:var(--bg2)}
        .timeline{position:relative;padding-left:44px}
        .timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(180deg,var(--or) 0%,rgba(255,85,0,0.2) 100%)}
        .tl-item{position:relative;margin-bottom:52px;opacity:0;transform:translateX(-24px);transition:all 0.7s cubic-bezier(0.16,1,0.3,1)}
        .tl-item.vis{opacity:1;transform:translateX(0)}
        .tl-dot{position:absolute;left:-51px;top:22px;width:16px;height:16px;border-radius:50%;background:var(--bg2);border:2px solid var(--or);transition:all 0.3s;cursor:pointer;box-shadow:0 0 0 4px rgba(255,85,0,0)}
        .tl-item:hover .tl-dot{background:var(--or);box-shadow:0 0 0 4px rgba(255,85,0,0.15),0 0 24px rgba(255,85,0,0.6)}
        .tl-card{background:var(--card);border:1px solid var(--bdr);border-radius:4px;padding:36px 40px;transition:all 0.4s;cursor:pointer;position:relative;overflow:hidden}
        .tl-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--or),var(--org));transform:scaleY(0);transform-origin:top;transition:transform 0.45s cubic-bezier(0.16,1,0.3,1)}
        .tl-card:hover{border-color:rgba(255,85,0,0.3);background:rgba(255,85,0,0.035)}
        .tl-card:hover::before{transform:scaleY(1)}
        .tl-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
        .tl-role{font-size:18px;font-weight:700;letter-spacing:-0.3px}
        .tl-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--or);text-align:right;line-height:1.6}
        .tl-co{font-family:'Space Mono',monospace;font-size:11px;color:var(--or);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:18px;opacity:0.8}
        .tl-desc{font-size:14px;color:var(--mu);line-height:1.8;max-height:0;overflow:hidden;transition:max-height 0.55s cubic-bezier(0.16,1,0.3,1),opacity 0.4s}
        .tl-desc.open{max-height:220px;opacity:1}
        .tl-desc:not(.open){opacity:0}
        .tl-toggle{display:inline-flex;align-items:center;gap:10px;margin-top:18px;font-size:11px;color:var(--or);font-family:'Space Mono',monospace;letter-spacing:1.5px;cursor:pointer;transition:gap 0.3s}
        .tl-toggle:hover{gap:16px}
        .tl-arr{transition:transform 0.4s}
        .tl-arr.rot{transform:rotate(90deg)}
        
        /* SKILLS */
        #skills{background:var(--bg)}
        .skills-intro{font-family:'Space Mono',monospace;font-size:13px;color:var(--mu);line-height:1.75;max-width:520px;margin-bottom:64px}
        .skill-cats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:52px}
        .skill-cat-btn{padding:10px 24px;border:1px solid var(--bdr);border-radius:2px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);background:transparent;cursor:pointer;transition:all 0.3s;font-family:'Syne',sans-serif}
        .skill-cat-btn.active,.skill-cat-btn:hover{background:var(--or);color:#000;border-color:var(--or)}
        .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
        .skill-card{padding:22px 24px;background:var(--card);border:1px solid var(--bdr);border-radius:4px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.38s;opacity:0;transform:translateY(20px)}
        .skill-card.vis{opacity:1;transform:translateY(0)}
        .skill-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,85,0,0.08),transparent);opacity:0;transition:opacity 0.3s}
        .skill-card:hover{border-color:rgba(255,85,0,0.4);transform:translateY(-5px);box-shadow:0 14px 48px rgba(255,85,0,0.1)}
        .skill-card:hover::after{opacity:1}
        .skill-name{font-size:14px;font-weight:700;margin-bottom:10px;position:relative;z-index:1}
        .skill-bar-wrap{height:1px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative;z-index:1}
        .skill-bar{height:100%;background:linear-gradient(90deg,var(--or),var(--org));width:0%;transition:width 1.4s cubic-bezier(0.16,1,0.3,1)}
        .skill-card.vis .skill-bar{width:var(--pct)}
        .skill-lvl{font-family:'Space Mono',monospace;font-size:10px;color:var(--mu);margin-top:8px;position:relative;z-index:1}
        
        /* PROCESS */
        #process{background:var(--bg2)}
        .process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
        .proc-card{padding:40px 30px;background:var(--card);border:1px solid var(--bdr);border-radius:4px;cursor:pointer;transition:all 0.4s;position:relative;overflow:hidden}
        .proc-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--or),var(--org));transform:scaleX(0);transform-origin:left;transition:transform 0.55s cubic-bezier(0.16,1,0.3,1)}
        .proc-card:hover,.proc-card.active{border-color:rgba(255,85,0,0.25);background:rgba(255,85,0,0.03);transform:translateY(-7px);box-shadow:0 20px 60px rgba(255,85,0,0.07)}
        .proc-card:hover::after,.proc-card.active::after{transform:scaleX(1)}
        .proc-num{font-size:52px;font-weight:800;color:rgba(255,85
